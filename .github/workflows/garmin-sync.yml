name: Garmin Marathon Sync

on:
  schedule:
    # 9:05am US Eastern. GitHub Actions cron is UTC-only, so this drifts by
    # an hour around US DST transitions (mid-Mar and early Nov) -- fine for
    # a "daily-ish" sync, not worth a second cron entry.
    - cron: "5 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install garminconnect json5

      - name: Run sync
        env:
          GARMIN_TOKENSTORE_B64: ${{ secrets.GARMIN_TOKENSTORE_B64 }}
        run: python3 scripts/sync_action.py

      - name: Commit and push if changed
        run: |
          git config user.name "marathon-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Automated Garmin sync $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
