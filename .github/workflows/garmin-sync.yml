name: Garmin Marathon Sync

on:
  schedule:
    # Every 2 hours, 6am-10pm US Eastern (6,8,10,12,2,4,6,8,10pm).
    # GitHub Actions cron is UTC-only. Written for EDT (UTC-4), which holds
    # for the entire training block -- DST doesn't end until Nov 1, 2026,
    # the same day as the race, so no drift to worry about until then.
    # Offset to :23 (rather than :00/:07/:30/:45) to steer clear of the
    # highest-contention minutes on GitHub's shared schedule queue --
    # schedule events are best-effort and can be delayed or dropped under
    # load, worse at common offsets. See also: external workflow_dispatch
    # trigger (cron-job.org) as a belt-and-suspenders backup.
    - cron: "23 10,12,14,16,18,20,22,0,2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install garminconnect==0.3.2 json5==0.15.0 pynacl==1.5.0

      - name: Run sync
        env:
          GARMIN_TOKENSTORE_B64: ${{ secrets.GARMIN_TOKENSTORE_B64 }}
          # Used only to re-upload the tokenstore secret after each run, so
          # refreshed tokens don't get discarded when the ephemeral runner
          # is torn down (see sync_tokenstore_secret() in sync_action.py).
          GH_SECRETS_PAT: ${{ secrets.GH_SECRETS_PAT }}
        run: python3 scripts/sync_action.py

      - name: Commit and push if changed
        run: |
          git config user.name "marathon-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Automated Garmin sync $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
